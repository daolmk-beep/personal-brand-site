<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
.stage{position:relative;width:1280px;height:720px;overflow:hidden;font-family:'Malgun Gothic',sans-serif;
  background:radial-gradient(120% 100% at 30% 20%,#1a2738 0%,#0E1116 60%,#070a0d 100%);color:#EAEEF3}
.grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(#9fb6d6 1px,transparent 1px),linear-gradient(90deg,#9fb6d6 1px,transparent 1px);background-size:48px 48px}
.vig{position:absolute;inset:0;box-shadow:inset 0 0 260px 60px rgba(0,0,0,.72)}
.kick{position:absolute;left:64px;top:78px;font-size:32px;letter-spacing:.1em;color:#E8B33D;font-weight:800}
.h{position:absolute;left:58px;top:126px;font-size:150px;line-height:.96;font-weight:900;letter-spacing:-.02em;text-shadow:0 6px 30px rgba(0,0,0,.6)}
.h .r{color:#D64545}
.sub{position:absolute;left:64px;bottom:74px;font-size:40px;font-weight:800}
.sub .a{color:#E8B33D}
/* 이상치 막대 — 화면 밖으로 치솟음 + 빨간 취소 */
.evlab{position:absolute;right:300px;top:150px;font-size:26px;font-weight:800;color:#9fb1c4;letter-spacing:.04em}
.outlier{position:absolute;right:-34px;top:190px;width:440px;height:118px;border-radius:8px;
  background:linear-gradient(90deg,#6e1c1c,#d64545);display:flex;align-items:center;justify-content:center;
  font-size:66px;font-weight:900;color:#fff;box-shadow:0 12px 44px rgba(214,69,69,.45)}
.cut{position:absolute;right:-34px;top:243px;width:474px;height:11px;background:#fff;transform:rotate(-5deg);box-shadow:0 0 14px rgba(255,255,255,.9)}
.arrow{position:absolute;right:150px;top:320px;width:5px;height:70px;background:#D64545}
.arrow:after{content:"";position:absolute;left:-13px;bottom:-20px;border-left:16px solid transparent;border-right:16px solid transparent;border-top:24px solid #D64545}
.excl{position:absolute;right:78px;top:420px;background:#D64545;color:#fff;font-weight:900;font-size:38px;padding:14px 30px;border-radius:12px;transform:rotate(-3deg);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.chip{position:absolute;right:64px;bottom:70px;background:rgba(232,179,61,.14);border:2px solid #E8B33D;border-radius:14px;
  padding:14px 24px;font-size:30px;font-weight:800;color:#E8B33D}
</style></head><body>
<div class="stage">
  <div class="grid"></div>
  <div class="kick">AI VALUATION · 방어 가능한가</div>
  <div class="evlab">EV / EBITDA</div>
  <div class="outlier">230×</div>
  <div class="cut"></div>
  <div class="arrow"></div>
  <div class="excl">이상치 제외</div>
  <div class="h">비교기업<br><span class="r">230배?</span></div>
  <div class="sub">왜 뺐는지, <span class="a">시트로 추적된다</span></div>
  <div class="chip">근거 = 출처검증 시트</div>
  <div class="vig"></div>
</div></body></html>
