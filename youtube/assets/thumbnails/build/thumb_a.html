<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
.stage{position:relative;width:1280px;height:720px;overflow:hidden;font-family:'Malgun Gothic',sans-serif;
  background:radial-gradient(120% 100% at 75% 25%,#1a2738 0%,#0E1116 58%,#070a0d 100%);color:#EAEEF3}
.grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(#9fb6d6 1px,transparent 1px),linear-gradient(90deg,#9fb6d6 1px,transparent 1px);background-size:48px 48px}
.vig{position:absolute;inset:0;box-shadow:inset 0 0 260px 60px rgba(0,0,0,.72)}
.kick{position:absolute;left:64px;top:96px;font-size:34px;letter-spacing:.12em;color:#E8B33D;font-weight:800}
.h{position:absolute;left:60px;top:150px;font-size:158px;line-height:.98;font-weight:900;letter-spacing:-.02em;text-shadow:0 6px 30px rgba(0,0,0,.6)}
.h .r{color:#D64545}
.tag{position:absolute;left:66px;bottom:70px;font-size:30px;font-weight:700;color:#9fb1c4}
.tag b{color:#EAEEF3}
/* football field 우측 */
.ff{position:absolute;right:48px;top:150px;width:520px;height:430px}
.bar{position:absolute;height:62px;border-radius:6px;display:flex;align-items:center;padding-left:14px;font-size:22px;font-weight:800;color:#fff}
.band{position:absolute;top:0;bottom:0;background:rgba(232,179,61,.16);border-left:3px solid #E8B33D;border-right:3px solid #E8B33D}
.stamp{position:absolute;right:14px;bottom:-6px;background:#E8B33D;color:#1a1206;font-weight:900;font-size:26px;padding:8px 18px;border-radius:10px;transform:rotate(-5deg)}
.lab{position:absolute;font-size:20px;font-weight:800;color:#9fb1c4}
</style></head><body>
<div class="stage">
  <div class="grid"></div>
  <div class="kick">AI 밸류에이션 자동화</div>
  <div class="h">이 숫자,<br><span class="r">근거 있어?</span></div>
  <div class="tag">회계사 × Claude Code · <b>증거우선 밸류에이션</b></div>
  <div class="ff">
    <div class="band" style="left:300px;width:150px"></div>
    <div class="bar" style="top:8px;  left:150px;width:230px;background:linear-gradient(90deg,#2f7d5b,#3fa172)">DCF</div>
    <div class="bar" style="top:86px; left:135px;width:215px;background:linear-gradient(90deg,#2f6db0,#4a86c8)">DCF</div>
    <div class="bar" style="top:164px;left:235px;width:255px;background:linear-gradient(90deg,#1c2b54,#33407a)">Peer</div>
    <div class="bar" style="top:242px;left:40px; width:170px;background:linear-gradient(90deg,#6b7686,#9aa6b5)">SOTP</div>
    <div class="bar" style="top:330px;left:300px;width:150px;background:linear-gradient(90deg,#c23b3b,#e05454);font-size:20px">최종 5,850~7,150</div>
    <div class="stamp">출처 추적 ✓</div>
  </div>
  <div class="vig"></div>
</div></body></html>
